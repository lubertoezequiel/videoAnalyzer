<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tótem Galicia · Autoservicio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="stage">
  <div id="totem-scaler">
    <div class="totem">
      <div class="totem-cam">
        <span class="lens live"></span>
        <span class="cam-label">Cámara · análisis de situaciones</span>
      </div>
      <div id="root"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script src="voice-engine.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="avatar.jsx"></script>
<script type="text/babel" src="screens-main.jsx"></script>
<script type="text/babel" src="screens-voice.jsx"></script>
<script type="text/babel" src="screens-overlay.jsx"></script>
<script type="text/babel" src="screens-extra.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script>
  // Escalado del tótem para encajar en cualquier viewport (carta vertical).
  function fitTotem() {
    var scaler = document.getElementById("totem-scaler");
    if (!scaler) return;
    var frameW = 1180, frameH = 2040;
    var marginX = 36, marginBottom = 96; // espacio para consola de demo
    var s = Math.min((window.innerWidth - marginX) / frameW, (window.innerHeight - marginBottom) / frameH);
    s = Math.max(0.1, s);
    scaler.style.transform = "translate(-50%, -50%) scale(" + s + ")";
  }
  window.addEventListener("resize", fitTotem);
  window.addEventListener("load", fitTotem);
  fitTotem();
  // re-fit cuando las fuentes cargan (cambia métricas mínimas)
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(fitTotem);
</script>
</body>
</html>
