<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Central de Monitoreo · videoAnalyzer</title>
<style>
  :root {
    --bg: #0d1017; --panel: #151a24; --panel-2: #1c2230; --line: #283042;
    --ink: #e6ebf2; --muted: #8a94a6; --faint: #5c6677;
    --accent: #3f8ae0; --green: #2ec16b; --amber: #f5a524; --red: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--ink); height: 100vh; display: flex; flex-direction: column; }

  header { display: flex; align-items: center; gap: 16px; padding: 14px 22px; background: var(--panel); border-bottom: 1px solid var(--line); }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
  header .sub { font-size: 13px; color: var(--faint); }
  .conn { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .conn input { background: var(--panel-2); border: 1px solid var(--line); color: var(--ink); padding: 8px 12px; border-radius: 8px; font-size: 13px; width: 230px; font-family: ui-monospace, monospace; }
  .conn button { background: var(--accent); color: #fff; border: none; padding: 9px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .conn button.off { background: var(--panel-2); border: 1px solid var(--line); color: var(--muted); }
  .status { display: flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 600; }
  .status .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--faint); }
  .status.on .dot { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .status.err .dot { background: var(--red); }

  .stats { display: flex; gap: 10px; padding: 12px 22px; background: var(--panel); border-bottom: 1px solid var(--line); }
  .stat { background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px; padding: 8px 16px; min-width: 96px; }
  .stat .k { font-size: 11px; color: var(--faint); text-transform: uppercase; letter-spacing: 0.08em; }
  .stat .v { font-size: 22px; font-weight: 800; }
  .stat.panic .v { color: var(--red); }

  main { flex: 1; display: grid; grid-template-columns: 1.6fr 1fr; min-height: 0; }
  .feed, .raw { overflow-y: auto; padding: 18px; }
  .feed { border-right: 1px solid var(--line); }
  .section-h { font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--faint); font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 14px 16px; margin-bottom: 12px; display: flex; gap: 14px; animation: pop 0.25s ease; }
  @keyframes pop { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
  .card .thumb { width: 132px; height: 88px; border-radius: 9px; object-fit: cover; background: var(--panel-2); border: 1px solid var(--line); flex: 0 0 auto; }
  .card .body { flex: 1; min-width: 0; }
  .card .row1 { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .badge { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; padding: 3px 9px; border-radius: 999px; }
  .badge.cam { background: rgba(63,138,224,0.16); color: #8fc0f5; }
  .badge.obj { background: rgba(46,193,107,0.16); color: #7ee0a6; }
  .badge.panic { background: var(--red); color: #fff; }
  .badge.end { background: var(--panel-2); color: var(--muted); }
  .card .title { font-size: 16px; font-weight: 700; }
  .card .meta { font-size: 13px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
  .card .time { font-size: 12px; color: var(--faint); font-family: ui-monospace, monospace; margin-left: auto; }

  .card.panic { border-color: var(--red); background: linear-gradient(180deg, rgba(239,68,68,0.12), var(--panel)); }
  .card.panic.active { animation: flash 1.1s ease-in-out infinite; }
  @keyframes flash { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); } 50% { box-shadow: 0 0 0 5px rgba(239,68,68,0); } }
  .card.resolved { opacity: 0.55; }

  .raw { background: var(--bg); }
  .raw .line { font-family: ui-monospace, monospace; font-size: 12px; padding: 5px 8px; border-bottom: 1px solid var(--line); display: flex; gap: 10px; color: var(--muted); }
  .raw .line .t { color: var(--faint); flex: 0 0 auto; }
  .raw .line .topic { color: #8fc0f5; flex: 0 0 auto; max-width: 45%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .raw .line .pl { color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .empty { color: var(--faint); font-size: 14px; padding: 30px; text-align: center; }
</style>
</head>
<body>
  <header>
    <div>
      <h1>🛰️ Central de Monitoreo</h1>
      <div class="sub">videoAnalyzer · señales MQTT en tiempo real</div>
    </div>
    <div class="conn">
      <input id="brokerUrl" value="ws://localhost:9001" spellcheck="false" />
      <button id="connectBtn">Conectar</button>
      <div class="status" id="status"><span class="dot"></span><span id="statusTxt">Desconectado</span></div>
    </div>
  </header>

  <div class="stats">
    <div class="stat"><div class="k">Eventos</div><div class="v" id="cEvents">0</div></div>
    <div class="stat"><div class="k">Imágenes</div><div class="v" id="cImages">0</div></div>
    <div class="stat panic"><div class="k">Alertas</div><div class="v" id="cPanic">0</div></div>
    <div class="stat"><div class="k">Mensajes</div><div class="v" id="cRaw">0</div></div>
  </div>

  <main>
    <div class="feed">
      <div class="section-h">Señales reconocidas</div>
      <div id="feed"><div class="empty">Esperando señales… conectá al broker.</div></div>
    </div>
    <div class="raw">
      <div class="section-h">Entradas crudas al broker</div>
      <div id="raw"><div class="empty">—</div></div>
    </div>
  </main>

  <script src="https://unpkg.com/mqtt@5.10.1/dist/mqtt.min.js"></script>
  <script>
  (function () {
    var client = null;
    var counts = { events: 0, images: 0, panic: 0, raw: 0 };
    var panicCards = {}; // totem_id -> card element (para resolver/cancelar)

    var $ = function (id) { return document.getElementById(id); };
    var feed = $("feed"), raw = $("raw");

    function setStatus(state, text) {
      var el = $("status");
      el.className = "status" + (state ? " " + state : "");
      $("statusTxt").textContent = text;
    }
    function bump(key, el) { counts[key]++; el.textContent = counts[key]; }
    function clearEmpty(container) { var e = container.querySelector(".empty"); if (e) e.remove(); }
    function prepend(container, node) { clearEmpty(container); container.insertBefore(node, container.firstChild); }
    function fmtTime(ts) { return new Date(ts || Date.now()).toLocaleTimeString("es-AR", { hour: "2-digit", minute: "2-digit", second: "2-digit" }); }

    // Beep de alerta para el pánico (WebAudio, sin assets).
    function alarm() {
      try {
        var Ctx = window.AudioContext || window.webkitAudioContext; if (!Ctx) return;
        var ctx = new Ctx(), now = ctx.currentTime;
        [[880, 0], [660, 0.18], [880, 0.36]].forEach(function (p) {
          var o = ctx.createOscillator(), g = ctx.createGain();
          o.type = "square"; o.frequency.value = p[0];
          g.gain.setValueAtTime(0.0001, now + p[1]);
          g.gain.exponentialRampToValueAtTime(0.25, now + p[1] + 0.02);
          g.gain.exponentialRampToValueAtTime(0.0001, now + p[1] + 0.16);
          o.connect(g).connect(ctx.destination); o.start(now + p[1]); o.stop(now + p[1] + 0.18);
        });
        setTimeout(function () { try { ctx.close(); } catch (e) {} }, 800);
      } catch (e) {}
    }

    function rawLine(topic, summary) {
      var line = document.createElement("div"); line.className = "line";
      line.innerHTML = '<span class="t"></span><span class="topic"></span><span class="pl"></span>';
      line.children[0].textContent = fmtTime();
      line.children[1].textContent = topic;
      line.children[2].textContent = summary;
      prepend(raw, line);
      while (raw.children.length > 200) raw.removeChild(raw.lastChild);
      bump("raw", $("cRaw"));
    }

    // ── Señal de pánico del tótem ───────────────────────────────
    function handlePanic(topic, data) {
      if (data.type === "panic_cancel" || data.status === "cancelled") {
        var existing = panicCards[data.totem_id];
        if (existing) { existing.classList.remove("active"); existing.classList.add("resolved"); existing.querySelector(".badge").textContent = "Cancelada"; }
        return;
      }
      if (data.type !== "panic") return;
      bump("panic", $("cPanic"));
      var card = document.createElement("div");
      card.className = "card panic active";
      card.innerHTML =
        '<div class="body">' +
          '<div class="row1"><span class="badge panic">🚨 Emergencia</span><span class="time"></span></div>' +
          '<div class="title">Botón de pánico · ' + (data.totem_id || "tótem") + '</div>' +
          '<div class="meta"></div>' +
        '</div>';
      card.querySelector(".time").textContent = data.time || fmtTime(data.ts);
      card.querySelector(".meta").textContent =
        "Sucursal: " + (data.branch || data.location || "—") + " · Estado: atención requerida";
      prepend(feed, card);
      panicCards[data.totem_id] = card;
      alarm();
    }

    // ── Evento de Frigate (frigate/events) ──────────────────────
    function handleFrigateEvent(data) {
      var a = data.after || data.before || {};
      if (!a.camera) return;
      bump("events", $("cEvents"));
      var ended = data.type === "end";
      var card = document.createElement("div");
      card.className = "card";
      card.innerHTML =
        '<div class="body">' +
          '<div class="row1">' +
            '<span class="badge cam"></span><span class="badge obj"></span>' +
            (ended ? '<span class="badge end">finalizó</span>' : '') +
            '<span class="time"></span>' +
          '</div>' +
          '<div class="title"></div><div class="meta"></div>' +
        '</div>';
      card.querySelector(".cam").textContent = "📷 " + a.camera;
      card.querySelector(".obj").textContent = a.label || "objeto";
      card.querySelector(".time").textContent = fmtTime((a.start_time || 0) * 1000 || Date.now());
      card.querySelector(".title").textContent =
        (a.label || "Objeto") + " detectado en " + a.camera;
      var score = typeof a.score === "number" ? Math.round(a.score * 100) + "%" : (typeof a.top_score === "number" ? Math.round(a.top_score * 100) + "%" : "—");
      card.querySelector(".meta").textContent =
        "Confianza: " + score + (a.current_zones && a.current_zones.length ? " · Zona: " + a.current_zones.join(", ") : "");
      prepend(feed, card);
    }

    // ── Alerta de la app de cámara: persona en el piso / caída ──
    function handleCameraAlert(topic, data) {
      bump("panic", $("cPanic"));
      var card = document.createElement("div");
      card.className = "card panic active";
      card.innerHTML =
        '<div class="body">' +
          '<div class="row1"><span class="badge panic">⚠️ Persona en el piso</span><span class="time"></span></div>' +
          '<div class="title">Posible persona caída · ' + (data.camera || "cámara") + '</div>' +
          '<div class="meta"></div>' +
        '</div>';
      card.querySelector(".time").textContent = data.time || fmtTime(data.ts);
      var score = typeof data.score === "number" ? Math.round(data.score * 100) + "%" : "—";
      card.querySelector(".meta").textContent =
        "Detección por visión · confianza " + score + (data.ratio ? " · relación caja " + data.ratio : "");
      prepend(feed, card);
      alarm();
    }

    // ── Snapshot de Frigate (imagen JPEG por MQTT) ──────────────
    function handleSnapshot(topic, payload) {
      // topic: frigate/<cam>/<obj>/snapshot
      var parts = topic.split("/");
      var cam = parts[1], obj = parts[2];
      bump("images", $("cImages"));
      var blob = new Blob([payload], { type: "image/jpeg" });
      var url = URL.createObjectURL(blob);
      var card = document.createElement("div");
      card.className = "card";
      card.innerHTML =
        '<img class="thumb" alt="snapshot" />' +
        '<div class="body">' +
          '<div class="row1"><span class="badge cam"></span><span class="badge obj"></span><span class="time"></span></div>' +
          '<div class="title">Captura de cámara</div>' +
          '<div class="meta">Imagen recibida del módulo de visión.</div>' +
        '</div>';
      card.querySelector(".thumb").src = url;
      card.querySelector(".cam").textContent = "📷 " + cam;
      card.querySelector(".obj").textContent = obj;
      card.querySelector(".time").textContent = fmtTime();
      prepend(feed, card);
    }

    function onMessage(topic, payload) {
      // payload es Uint8Array. Para tópicos de imagen lo dejamos binario.
      // Snapshots de Frigate (frigate/<cam>/<obj>/snapshot) o de la app de
      // cámara del navegador (camera/<cam>/<obj>/snapshot).
      var isSnapshot = /^(frigate|camera)\/[^/]+\/[^/]+\/snapshot$/.test(topic);
      if (isSnapshot) { rawLine(topic, "<imagen " + payload.length + " bytes>"); handleSnapshot(topic, payload); return; }

      var text = new TextDecoder().decode(payload);
      rawLine(topic, text);

      if (/^totem\/[^/]+\/emergency$/.test(topic)) {
        try { handlePanic(topic, JSON.parse(text)); } catch (e) {}
      } else if (/^camera\/[^/]+\/alert$/.test(topic)) {
        try { handleCameraAlert(topic, JSON.parse(text)); } catch (e) {}
      } else if (topic === "frigate/events" || /^camera\/[^/]+\/events$/.test(topic)) {
        // Eventos de Frigate o de la app de cámara (misma forma {after:{...}}).
        try { handleFrigateEvent(JSON.parse(text)); } catch (e) {}
      }
    }

    function connect() {
      var url = $("brokerUrl").value.trim();
      if (client) { client.end(true); client = null; }
      setStatus("", "Conectando…");
      $("connectBtn").textContent = "Conectando…";
      client = mqtt.connect(url, { clientId: "dashboard-" + Math.random().toString(16).slice(2, 8), reconnectPeriod: 3000, connectTimeout: 5000 });

      client.on("connect", function () {
        setStatus("on", "Conectado");
        $("connectBtn").textContent = "Desconectar";
        $("connectBtn").className = "off";
        client.subscribe(["totem/#", "frigate/#", "camera/#"], { qos: 0 });
      });
      client.on("reconnect", function () { setStatus("", "Reconectando…"); });
      client.on("error", function (e) { setStatus("err", "Error: " + (e && e.message || e)); });
      client.on("close", function () { if (client) setStatus("err", "Desconectado"); });
      client.on("message", onMessage);
    }
    function disconnect() {
      if (client) { client.end(true); client = null; }
      setStatus("", "Desconectado");
      $("connectBtn").textContent = "Conectar";
      $("connectBtn").className = "";
    }

    $("connectBtn").addEventListener("click", function () {
      if (client) disconnect(); else connect();
    });
    // Permite pasar el broker por querystring: ?broker=ws://host:9001&autoconnect=1
    var qs = new URLSearchParams(location.search);
    if (qs.get("broker")) $("brokerUrl").value = qs.get("broker");
    if (qs.get("autoconnect") === "1") connect();
  })();
  </script>
</body>
</html>
