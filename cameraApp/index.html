<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>App de Cámara · videoAnalyzer</title>
<style>
  :root {
    --bg: #0d1017; --panel: #151a24; --panel-2: #1c2230; --line: #283042;
    --ink: #e6ebf2; --muted: #8a94a6; --faint: #5c6677;
    --accent: #3f8ae0; --green: #2ec16b; --red: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }
  header { display: flex; align-items: center; gap: 16px; padding: 14px 22px; background: var(--panel); border-bottom: 1px solid var(--line); flex-wrap: wrap; }
  header h1 { font-size: 18px; font-weight: 700; }
  header .sub { font-size: 13px; color: var(--faint); }
  .conn { margin-left: auto; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .conn input { background: var(--panel-2); border: 1px solid var(--line); color: var(--ink); padding: 8px 12px; border-radius: 8px; font-size: 13px; width: 220px; font-family: ui-monospace, monospace; }
  button { background: var(--accent); color: #fff; border: none; padding: 9px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  button.ghost { background: var(--panel-2); border: 1px solid var(--line); color: var(--muted); }
  button:disabled { opacity: 0.5; cursor: default; }
  .status { display: flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 600; }
  .status .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--faint); }
  .status.on .dot { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .status.err .dot { background: var(--red); }

  main { display: grid; grid-template-columns: 1.5fr 1fr; gap: 18px; padding: 18px; align-items: start; }
  .stage { position: relative; background: #000; border-radius: 14px; overflow: hidden; border: 1px solid var(--line); aspect-ratio: 4 / 3; }
  .stage video, .stage canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .stage .hint { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--faint); font-size: 15px; text-align: center; padding: 20px; }
  .bar { display: flex; gap: 10px; padding: 12px 0; flex-wrap: wrap; }

  .side .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 16px; margin-bottom: 16px; }
  .panel h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--faint); margin-bottom: 12px; }
  .det { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 15px; }
  .det:last-child { border: 0; }
  .det .lab { font-weight: 700; text-transform: capitalize; }
  .det .sc { margin-left: auto; font-family: ui-monospace, monospace; color: var(--green); }
  .row { display: flex; gap: 10px; }
  .stat { background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px; padding: 8px 14px; flex: 1; }
  .stat .k { font-size: 11px; color: var(--faint); text-transform: uppercase; }
  .stat .v { font-size: 20px; font-weight: 800; }
  label.cfg { display: block; font-size: 13px; color: var(--muted); margin: 8px 0 4px; }
  .cfg input { width: 100%; background: var(--panel-2); border: 1px solid var(--line); color: var(--ink); padding: 7px 10px; border-radius: 7px; font-size: 13px; }
  .empty { color: var(--faint); font-size: 14px; }
</style>
</head>
<body>
  <header>
    <div>
      <h1>📷 App de Cámara</h1>
      <div class="sub">videoAnalyzer · detección en el navegador → MQTT</div>
    </div>
    <div class="conn">
      <input id="brokerUrl" value="ws://localhost:9001" spellcheck="false" />
      <div class="status" id="status"><span class="dot"></span><span id="statusTxt">Sin conectar</span></div>
    </div>
  </header>

  <main>
    <div>
      <div class="stage">
        <video id="video" playsinline muted></video>
        <canvas id="overlay"></canvas>
        <div class="hint" id="hint">Tocá «Iniciar cámara» para empezar. El navegador va a pedir permiso de la webcam.</div>
      </div>
      <div class="bar">
        <button id="startBtn">Iniciar cámara</button>
        <button id="stopBtn" class="ghost" disabled>Detener</button>
        <span class="status" id="modelStatus"><span class="dot"></span><span>Modelo no cargado</span></span>
      </div>
    </div>

    <div class="side">
      <div class="panel">
        <h3>Detecciones en vivo</h3>
        <div id="dets"><div class="empty">—</div></div>
      </div>
      <div class="panel">
        <div class="row">
          <div class="stat"><div class="k">Eventos enviados</div><div class="v" id="cEvents">0</div></div>
          <div class="stat"><div class="k">Snapshots</div><div class="v" id="cSnaps">0</div></div>
        </div>
      </div>
      <div class="panel">
        <h3>Configuración</h3>
        <label class="cfg">ID de la cámara<input id="camId" value="webcam-mac" /></label>
        <label class="cfg">Confianza mínima<input id="thr" type="number" min="0.1" max="0.95" step="0.05" value="0.6" /></label>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/mqtt@5.10.1/dist/mqtt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
  <script>
  (function () {
    var $ = function (id) { return document.getElementById(id); };
    var video = $("video"), overlay = $("overlay"), ctx = overlay.getContext("2d");
    var client = null, model = null, stream = null, running = false;
    var present = {}; // label -> lastSeenTime (para detectar entrada/salida)
    var counts = { events: 0, snaps: 0 };
    var snapCanvas = document.createElement("canvas");

    function cfg() {
      var qs = new URLSearchParams(location.search);
      return {
        url: ($("brokerUrl").value || "ws://localhost:9001").trim(),
        camId: ($("camId").value || "webcam-mac").trim(),
        thr: parseFloat($("thr").value) || 0.6,
        topicBase: "camera",
      };
    }
    function setStatus(state, text) { $("status").className = "status" + (state ? " " + state : ""); $("statusTxt").textContent = text; }
    function nowSec() { return Date.now() / 1000; }

    // ── MQTT ────────────────────────────────────────────────────
    function ensureMqtt() {
      if (client && client.connected) return client;
      if (client) return client;
      var c = cfg();
      setStatus("", "Conectando…");
      client = mqtt.connect(c.url, { clientId: "camera-" + c.camId + "-" + Math.random().toString(16).slice(2, 8), reconnectPeriod: 3000, connectTimeout: 5000 });
      client.on("connect", function () { setStatus("on", "Conectado a " + c.url); });
      client.on("reconnect", function () { setStatus("", "Reconectando…"); });
      client.on("error", function (e) { setStatus("err", "Error: " + (e && e.message || e)); });
      client.on("close", function () { setStatus("err", "Desconectado"); });
      return client;
    }
    function publishEvent(type, label, score) {
      if (!client) return;
      var c = cfg();
      var payload = JSON.stringify({ type: type, after: { camera: c.camId, label: label, score: score, start_time: nowSec() } });
      client.publish(c.topicBase + "/" + c.camId + "/events", payload, { qos: 0 });
      counts.events++; $("cEvents").textContent = counts.events;
    }
    function publishSnapshot(label) {
      if (!client || !video.videoWidth) return;
      var c = cfg();
      var w = 480, h = Math.round(480 * video.videoHeight / video.videoWidth);
      snapCanvas.width = w; snapCanvas.height = h;
      snapCanvas.getContext("2d").drawImage(video, 0, 0, w, h);
      snapCanvas.toBlob(function (blob) {
        if (!blob) return;
        blob.arrayBuffer().then(function (buf) {
          client.publish(c.topicBase + "/" + c.camId + "/" + label + "/snapshot", new Uint8Array(buf), { qos: 0 });
          counts.snaps++; $("cSnaps").textContent = counts.snaps;
        });
      }, "image/jpeg", 0.6);
    }

    // ── Cámara + detección ──────────────────────────────────────
    async function start() {
      $("startBtn").disabled = true;
      ensureMqtt();
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 }, audio: false });
      } catch (e) {
        $("hint").textContent = "No se pudo abrir la cámara: " + e.message + ". (Necesita http://localhost o https.)";
        $("startBtn").disabled = false; return;
      }
      video.srcObject = stream; await video.play();
      $("hint").style.display = "none";
      overlay.width = video.videoWidth; overlay.height = video.videoHeight;

      if (!model) {
        $("modelStatus").innerHTML = '<span class="dot"></span><span>Cargando modelo…</span>';
        model = await cocoSsd.load();
        $("modelStatus").innerHTML = '<span class="dot" style="background:var(--green)"></span><span>Modelo listo (COCO-SSD)</span>';
      }
      running = true; $("stopBtn").disabled = false;
      loop();
    }
    function stop() {
      running = false;
      if (stream) { stream.getTracks().forEach(function (t) { t.stop(); }); stream = null; }
      video.srcObject = null; ctx.clearRect(0, 0, overlay.width, overlay.height);
      $("hint").style.display = ""; $("hint").textContent = "Cámara detenida.";
      $("startBtn").disabled = false; $("stopBtn").disabled = true;
      $("dets").innerHTML = '<div class="empty">—</div>';
    }

    async function loop() {
      if (!running || !model) return;
      var thr = cfg().thr;
      var preds = await model.detect(video);
      var now = Date.now(), seen = {};
      // dibujar cajas + lista
      ctx.clearRect(0, 0, overlay.width, overlay.height);
      ctx.lineWidth = 3; ctx.font = "16px system-ui"; ctx.textBaseline = "top";
      var listed = [];
      preds.forEach(function (p) {
        if (p.score < thr) return;
        seen[p.class] = Math.max(seen[p.class] || 0, p.score);
        var b = p.bbox;
        ctx.strokeStyle = "#2ec16b"; ctx.strokeRect(b[0], b[1], b[2], b[3]);
        ctx.fillStyle = "rgba(46,193,107,0.85)"; ctx.fillRect(b[0], b[1] - 20, ctx.measureText(p.class).width + 16, 20);
        ctx.fillStyle = "#06210f"; ctx.fillText(p.class + " " + Math.round(p.score * 100) + "%", b[0] + 6, b[1] - 19);
        listed.push(p);
      });
      // transiciones: nueva aparición → evento + snapshot
      Object.keys(seen).forEach(function (label) {
        if (!present[label]) { publishEvent("new", label, seen[label]); publishSnapshot(label); }
        present[label] = now;
      });
      // salida: no visto en 4s → evento "end"
      Object.keys(present).forEach(function (label) {
        if (!seen[label] && now - present[label] > 4000) { publishEvent("end", label, 0); delete present[label]; }
      });
      renderDets(listed);
      setTimeout(loop, 500); // ~2 detecciones/seg
    }

    function renderDets(preds) {
      if (!preds.length) { $("dets").innerHTML = '<div class="empty">Sin objetos sobre el umbral.</div>'; return; }
      $("dets").innerHTML = preds.map(function (p) {
        return '<div class="det"><span class="lab">' + p.class + '</span><span class="sc">' + Math.round(p.score * 100) + '%</span></div>';
      }).join("");
    }

    $("startBtn").addEventListener("click", start);
    $("stopBtn").addEventListener("click", stop);
    var qs = new URLSearchParams(location.search);
    if (qs.get("broker")) $("brokerUrl").value = qs.get("broker");
    if (qs.get("cam")) $("camId").value = qs.get("cam");
  })();
  </script>
</body>
</html>
