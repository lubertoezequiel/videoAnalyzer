# ── Listener MQTT nativo (TCP) ──────────────────────────────
# Lo usan los servicios del stack (Frigate, etc.).
listener 1883
protocol mqtt

# ── Listener MQTT-over-WebSocket ────────────────────────────
# Necesario para clientes de navegador (tótem y dashboard de monitoreo),
# que no pueden hablar MQTT por TCP. El puerto 9001 ya está expuesto en
# docker-compose.yml.
listener 9001
protocol websockets

allow_anonymous true
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
